<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>序章·从粒子里出发 | 0xt5 Blog</title>
    <link rel="icon" href="/images/custom-particlex-avatar.png" />

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-hover: rgba(255, 255, 255, 0.14);
            --text: rgba(247, 252, 255, 0.92);
            --muted: rgba(247, 252, 255, 0.65);
        }

        * {
            box-sizing: border-box;
        }

        body {
            align-items: center;
            background:
                radial-gradient(circle at 14% 18%, rgba(141, 233, 255, 0.18), transparent 28vw),
                radial-gradient(circle at 88% 8%, rgba(53, 106, 255, 0.18), transparent 24vw),
                radial-gradient(circle at 72% 82%, rgba(123, 108, 255, 0.12), transparent 20vw),
                linear-gradient(135deg, #050914, #0b1325 48%, #060a13);
            color: var(--text);
            display: flex;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            height: 100vh;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                linear-gradient(120deg, rgba(2, 6, 16, 0.42), rgba(5, 12, 26, 0.16) 42%, rgba(3, 8, 18, 0.36)),
                radial-gradient(circle at 50% 0, rgba(141, 233, 255, 0.16), transparent 42%);
        }

        .input_video {
            height: 100vh;
            height: 100dvh;
            inset: 0;
            object-fit: cover;
            opacity: 0.001;
            pointer-events: none;
            position: fixed;
            width: 100vw;
            z-index: 0;
        }

        .output_canvas {
            display: block;
            height: 100vh;
            height: 100dvh;
            inset: 0;
            object-fit: cover;
            position: fixed;
            width: 100vw;
            z-index: 1;
        }

        .startup-layer {
            align-items: center;
            display: flex;
            inset: 0;
            justify-content: center;
            padding: 24px;
            position: fixed;
            z-index: 3;
        }

        .startup-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.2);
            max-width: 560px;
            padding: 32px 30px 28px;
            text-align: center;
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            backdrop-filter: blur(20px) saturate(140%);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .startup-card.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px) scale(0.98);
        }

        .startup-badge {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            color: rgba(247, 252, 255, 0.85);
            display: inline-flex;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            margin-bottom: 18px;
            padding: 7px 14px;
            text-transform: uppercase;
        }

        .startup-card h1 {
            font-size: 34px;
            margin: 0 0 12px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff, #b8e8ff 50%, #ffffff);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 6s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .startup-desc {
            color: var(--muted);
            line-height: 1.8;
            margin: 0 auto 22px;
            max-width: 32em;
        }

        .hint-list {
            color: rgba(247, 252, 255, 0.58);
            font-size: 14px;
            line-height: 1.8;
            margin: 0 0 22px;
            padding: 0;
        }

        .hint-list li {
            list-style: none;
        }

        .action-row {
            align-items: center;
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }

        .start-button {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 999px;
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            font-weight: 800;
            min-width: 230px;
            padding: 16px 26px;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
        }

        .start-button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.16);
            transform: translateY(-2px);
        }

        .start-button:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
        }

        .start-button:disabled {
            cursor: wait;
            opacity: 0.7;
            transform: none;
        }

        .status-text {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
            margin: 0;
            min-height: 3.4em;
        }

        .status-text.error {
            color: #ffb6c1;
        }

        .status-text.success {
            color: #a0f0d0;
        }

        .top-bar {
            align-items: center;
            display: flex;
            gap: 12px;
            left: 18px;
            position: fixed;
            top: 18px;
            z-index: 4;
        }

        .top-link,
        .mode-chip {
            align-items: center;
            background:
                linear-gradient(135deg, rgba(39, 56, 78, 0.72), rgba(17, 27, 43, 0.7)),
                rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(141, 233, 255, 0.14);
            border-radius: 999px;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.07),
                0 10px 28px rgba(0, 0, 0, 0.24);
            color: rgba(237, 247, 255, 0.9);
            display: inline-flex;
            font-size: 15px;
            font-weight: 800;
            justify-content: center;
            letter-spacing: 0.01em;
            min-height: 42px;
            padding: 0 16px;
            text-decoration: none;
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            backdrop-filter: blur(18px) saturate(140%);
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .top-link:hover {
            background:
                linear-gradient(135deg, rgba(53, 76, 104, 0.82), rgba(22, 34, 54, 0.76)),
                rgba(141, 233, 255, 0.06);
            border-color: rgba(141, 233, 255, 0.34);
            transform: translateY(-1px);
        }

        .mode-chip {
            color: rgba(206, 221, 238, 0.88);
        }

        .mode-chip.success {
            border-color: rgba(163, 255, 122, 0.22);
            color: rgba(225, 255, 218, 0.92);
        }

        .mode-chip.error {
            border-color: rgba(255, 118, 95, 0.3);
            color: rgba(255, 215, 208, 0.95);
        }

        @media (max-width: 720px) {
            .startup-card {
                border-radius: 22px;
                padding: 24px 18px 20px;
            }

            .startup-card h1 {
                font-size: 28px;
            }

            .start-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a class="top-link" href="/game/">返回 game</a>
        <div class="mode-chip" id="modeChip">等待启动</div>
    </div>

    <div class="startup-layer" id="startupLayer">
        <div class="startup-card" id="startupCard">
            <div class="startup-badge">AI Gesture Lab</div>
            <h1>序章·从粒子里出发</h1>
            <p class="startup-desc">
                这个页面需要相机权限。点击下方按钮后，允许浏览器访问摄像头，画面启动后就可以通过手势切换三种特效模式。
            </p>
            <ul class="hint-list">
                <li>五指张开：触发粒子生成</li>
                <li>双手食指靠近并保持：切换模式</li>
                <li>如果启动失败，会在下面直接显示错误原因</li>
            </ul>
            <div class="action-row">
                <button class="start-button" id="startButton" type="button">启动相机并进入</button>
            </div>
            <p class="status-text" id="statusText">准备就绪。点击按钮后，如果浏览器弹窗询问权限，请选择“允许”。</p>
        </div>
    </div>

    <video class="input_video" autoplay playsinline muted></video>
    <canvas class="output_canvas"></canvas>

    <script>
        const videoElement = document.querySelector(".input_video");
        const canvasElement = document.querySelector(".output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const startButton = document.getElementById("startButton");
        const statusText = document.getElementById("statusText");
        const startupCard = document.getElementById("startupCard");
        const modeChip = document.getElementById("modeChip");

        function setStatus(text, type) {
            statusText.innerHTML = text;
            statusText.className = "status-text" + (type ? " " + type : "");
        }

        function setModeText(text, type) {
            modeChip.textContent = text;
            modeChip.className = "mode-chip" + (type ? " " + type : "");
        }

        function hideStartup() {
            const layer = document.getElementById("startupLayer");
            if (!layer) return;
            layer.style.pointerEvents = "none";
            startupCard.classList.add("hidden");
            window.setTimeout(() => {
                layer.style.display = "none";
            }, 380);
        }

        function resizeCanvas() {
            const viewport = window.visualViewport || window;
            canvasElement.width = Math.round(viewport.width || window.innerWidth);
            canvasElement.height = Math.round(viewport.height || window.innerHeight);
        }

        window.addEventListener("resize", resizeCanvas);
        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", resizeCanvas);
        }
        resizeCanvas();

        function fingersUp(hand) {
            let n = 0;
            [[8, 6], [12, 10], [16, 14], [20, 18]].forEach(([t, p]) => {
                if (hand[t].y < hand[p].y) n++;
            });
            return n;
        }

        function isPeace(hand) {
            return hand[8].y < hand[6].y &&
                hand[12].y < hand[10].y &&
                hand[16].y > hand[14].y &&
                hand[20].y > hand[18].y;
        }

        function palmPos(hand, width, height) {
            const joints = [0, 5, 9, 13, 17];
            const sum = joints.reduce((acc, index) => ({
                x: acc.x + hand[index].x,
                y: acc.y + hand[index].y
            }), { x: 0, y: 0 });

            return {
                x: sum.x / joints.length * width,
                y: sum.y / joints.length * height
            };
        }

        class BaseMode {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
            }

            init() {}

            update() {
                throw new Error("必须实现 update()");
            }

            destroy() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }
        }

        class ParticleMode extends BaseMode {
            constructor(canvas, ctx, shape) {
                super(canvas, ctx);
                this.shape = shape;
                this.particles = [];
                this.fireworkCooldown = {};
                this.zezeTimer = 0;
            }

            init() {
                this.particles = Array.from({ length: 80 }, () => ({
                    x: Math.random() * this.canvas.width,
                    y: Math.random() * this.canvas.height,
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: (Math.random() - 0.5) * 1.5,
                    size: Math.random() * 3 + 1,
                    hue: Math.random() * 360,
                    alpha: Math.random() * 0.5 + 0.3,
                    isFirework: false,
                    life: 1
                }));
                this.fireworkCooldown = {};
                this.zezeTimer = 0;
            }

            shapePoints() {
                if (this.shape === "heart") {
                    return Array.from({ length: 80 }, (_, index) => {
                        const t = (index / 80) * Math.PI * 2;

                        return {
                            x: 16 * Math.pow(Math.sin(t), 3),
                            y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
                        };
                    });
                }

                const starPoints = Array.from({ length: 10 }, (_, index) => {
                    const angle = -Math.PI / 2 + index * Math.PI / 5;
                    const radius = index % 2 === 0 ? 28 : 12;

                    return {
                        x: Math.cos(angle) * radius,
                        y: Math.sin(angle) * radius
                    };
                });

                return Array.from({ length: 80 }, (_, index) => {
                    const edgeProgress = (index / 80) * starPoints.length;
                    const edgeIndex = Math.floor(edgeProgress) % starPoints.length;
                    const nextIndex = (edgeIndex + 1) % starPoints.length;
                    const localProgress = edgeProgress - Math.floor(edgeProgress);
                    const start = starPoints[edgeIndex];
                    const end = starPoints[nextIndex];

                    return {
                        x: start.x + (end.x - start.x) * localProgress,
                        y: start.y + (end.y - start.y) * localProgress
                    };
                });
            }

            shapeBurst(cx, cy, handIndex) {
                if (this.fireworkCooldown[handIndex] > 0) return;
                this.fireworkCooldown[handIndex] = 40;

                const points = this.shapePoints();
                const baseHue = this.shape === "heart"
                    ? Math.random() * 60 + 330
                    : Math.random() * 38 + 38;

                for (let i = 0; i < 80; i++) {
                    const point = points[i];

                    this.particles.push({
                        x: cx,
                        y: cy,
                        vx: point.x * 1.25 + (Math.random() - 0.5) * 4,
                        vy: point.y * 1.25 + (Math.random() - 0.5) * 4,
                        size: Math.random() * 5 + 2,
                        hue: baseHue + (Math.random() - 0.5) * 30,
                        isFirework: true,
                        life: 1
                    });
                }
            }

            update(multiHandLandmarks, video) {
                const ctx = this.ctx;
                const width = this.canvas.width;
                const height = this.canvas.height;

                Object.keys(this.fireworkCooldown).forEach((handIndex) => {
                    if (this.fireworkCooldown[handIndex] > 0) {
                        this.fireworkCooldown[handIndex]--;
                    }
                });

                ctx.drawImage(video, 0, 0, width, height);
                ctx.fillStyle = "rgba(0,0,0,0.01)";
                ctx.fillRect(0, 0, width, height);

                if (multiHandLandmarks) {
                    if (
                        multiHandLandmarks.length >= 2 &&
                        isPeace(multiHandLandmarks[0]) &&
                        isPeace(multiHandLandmarks[1])
                    ) {
                        this.zezeTimer = 70;
                    }

                    multiHandLandmarks.forEach((hand, handIndex) => {
                        if (fingersUp(hand) >= 4) {
                            const pos = palmPos(hand, width, height);
                            this.shapeBurst(pos.x, pos.y, handIndex);
                        }
                    });
                }

                if (this.zezeTimer > 0) this.zezeTimer--;

                if (this.zezeTimer > 0) {
                    const alpha = Math.min(this.zezeTimer / 30, 1);
                    ctx.save();
                    ctx.translate(width, 0);
                    ctx.scale(-1, 1);
                    ctx.shadowColor = `rgba(255,100,200,${alpha})`;
                    ctx.shadowBlur = 60;
                    ctx.font = "bold 200px Arial Black";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillStyle = `rgba(255,200,240,${alpha})`;
                    ctx.fillText("ZEZE", width / 2, height / 2);
                    ctx.restore();
                }

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const particle = this.particles[i];

                    if (particle.isFirework) {
                        particle.vy += 0.3;
                        particle.vx *= 0.97;
                        particle.vy *= 0.97;
                        particle.x += particle.vx;
                        particle.y += particle.vy;
                        particle.life -= 0.016;

                        if (particle.life <= 0) {
                            this.particles.splice(i, 1);
                            continue;
                        }

                        ctx.beginPath();
                        ctx.arc(particle.x, particle.y, particle.size * particle.life, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${particle.hue},100%,65%,${particle.life})`;
                        ctx.fill();
                    } else {
                        if (this.zezeTimer > 0) {
                            const dx = width / 2 - particle.x;
                            const dy = height / 2 - particle.y;
                            const dist = Math.hypot(dx, dy);
                            if (dist > 0) {
                                particle.vx += dx / dist * 0.4;
                                particle.vy += dy / dist * 0.4;
                            }
                        }

                        particle.vx *= 0.99;
                        particle.vy *= 0.99;
                        particle.x += particle.vx;
                        particle.y += particle.vy;

                        if (particle.x < 0) particle.x = width;
                        if (particle.x > width) particle.x = 0;
                        if (particle.y < 0) particle.y = height;
                        if (particle.y > height) particle.y = 0;

                        particle.hue = (particle.hue + 0.5) % 360;

                        ctx.beginPath();
                        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${particle.hue},80%,70%,${particle.alpha})`;
                        ctx.fill();
                    }
                }
            }

            destroy() {
                this.particles = [];
                super.destroy();
            }
        }

        class ViewfinderMode extends BaseMode {
            constructor(canvas, ctx, filter) {
                super(canvas, ctx);
                this.filter = filter;
                this.motionValue = 0;
            }

            update(multiHandLandmarks, video) {
                const ctx = this.ctx;
                const width = this.canvas.width;
                const height = this.canvas.height;

                ctx.save();
                ctx.filter = this.filter;
                ctx.drawImage(video, 0, 0, width, height);
                ctx.restore();

                if (multiHandLandmarks && multiHandLandmarks.length >= 2) {
                    const h1 = multiHandLandmarks[0];
                    const h2 = multiHandLandmarks[1];
                    const points = [
                        { x: h1[4].x * width, y: h1[4].y * height },
                        { x: h1[8].x * width, y: h1[8].y * height },
                        { x: h2[4].x * width, y: h2[4].y * height },
                        { x: h2[8].x * width, y: h2[8].y * height }
                    ];

                    const minX = Math.min(...points.map((point) => point.x));
                    const maxX = Math.max(...points.map((point) => point.x));
                    const minY = Math.min(...points.map((point) => point.y));
                    const maxY = Math.max(...points.map((point) => point.y));

                    const rectWidth = maxX - minX;
                    const rectHeight = maxY - minY;
                    if (rectWidth < 10 || rectHeight < 10) return;

                    this.motionValue = Math.min(Math.hypot(rectWidth, rectHeight) / Math.hypot(width, height), 1);

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(minX, minY, rectWidth, rectHeight);
                    ctx.clip();
                    ctx.filter = this.filter === "invert(100%) contrast(140%) saturate(130%)"
                        ? "contrast(125%) saturate(130%)"
                        : "none";
                    ctx.drawImage(video, 0, 0, width, height);
                    ctx.lineWidth = 2 + this.motionValue * 6;
                    ctx.strokeStyle = `rgba(0,255,150,${0.5 + this.motionValue * 0.5})`;
                    ctx.stroke();
                    ctx.restore();
                }
            }
        }

        class TetherMode extends BaseMode {
            constructor(canvas, ctx, variant) {
                super(canvas, ctx);
                this.variant = variant;
                this.particles = [];
                this.focal = 500;
                this.maxParticles = this.isRasenganVariant() ? 560 : 300;
                this.spawnCooldown = {};
                this.prevPalmPos = {};
                this.rasenganSpawnTick = 0;
            }

            init() {
                this.particles = [];
                this.spawnCooldown = {};
                this.prevPalmPos = {};
                this.rasenganSpawnTick = 0;
            }

            isRasenganVariant() {
                return this.variant === "rasengan" || this.variant === "finger-rasengan";
            }

            isFingerRasengan() {
                return this.variant === "finger-rasengan";
            }

            isIndexOnly(hand) {
                const index = hand[8].y < hand[6].y;
                const middle = hand[12].y < hand[10].y;
                const ring = hand[16].y < hand[14].y;
                const pinky = hand[20].y < hand[18].y;
                return index && !middle && !ring && !pinky;
            }

            project(x, y, z) {
                const scale = this.focal / (z + this.focal);
                return {
                    sx: x * scale + this.canvas.width / 2,
                    sy: y * scale + this.canvas.height / 2,
                    scale
                };
            }

            spawnAt(wx, wy, count, impulse) {
                const overflow = this.particles.length + count - this.maxParticles;
                if (overflow > 0) this.particles.splice(0, overflow);

                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: wx + (Math.random() - 0.5) * 40,
                        y: wy + (Math.random() - 0.5) * 40,
                        z: (Math.random() - 0.5) * 120,
                        vx: impulse.x + (Math.random() - 0.5) * 2,
                        vy: impulse.y + (Math.random() - 0.5) * 2,
                        vz: impulse.z + (Math.random() - 0.5) * 0.8,
                        ax: 0,
                        ay: 0,
                        az: 0,
                        size: Math.random() * 4 + 1,
                        hue: Math.random() * 360,
                        swirlSeed: Math.random() * Math.PI * 2,
                        swirlDir: Math.random() > 0.5 ? 1 : -1
                    });
                }
            }

            update(multiHandLandmarks, video) {
                const ctx = this.ctx;
                const width = this.canvas.width;
                const height = this.canvas.height;

                ctx.drawImage(video, 0, 0, width, height);
                ctx.fillStyle = "rgba(0,0,20,0.01)";
                ctx.fillRect(0, 0, width, height);

                const indexTips = [];

                if (multiHandLandmarks) {
                    multiHandLandmarks.forEach((hand, handIndex) => {
                        const palm = palmPos(hand, width, height);
                        const indexTip = {
                            x: hand[8].x * width - width / 2,
                            y: hand[8].y * height - height / 2,
                            z: 0
                        };
                        const openHand = fingersUp(hand) >= 4;
                        const indexOnly = this.isIndexOnly(hand);

                        const attractByPalm = this.variant === "rasengan" && openHand;
                        const attractByFinger = (this.variant !== "rasengan" && indexOnly);

                        if (attractByPalm || attractByFinger) {
                            indexTips.push({
                                x: attractByPalm ? palm.x - width / 2 : indexTip.x,
                                y: attractByPalm ? palm.y - height / 2 : indexTip.y,
                                z: 0
                            });
                        }

                        const spawnByFinger = this.variant === "rasengan" && indexOnly;
                        const spawnByPalm = this.variant !== "rasengan" && openHand;

                        if (spawnByFinger || spawnByPalm) {
                            const now = Date.now();
                            if (!this.spawnCooldown[handIndex] || now - this.spawnCooldown[handIndex] > 500) {
                                this.spawnCooldown[handIndex] = now;

                                const attractX = palm.x - width / 2;
                                const attractY = palm.y - height / 2;
                                const wx = this.variant === "rasengan" ? indexTip.x : attractX;
                                const wy = this.variant === "rasengan" ? indexTip.y : attractY;
                                const prev = this.prevPalmPos[handIndex];
                                let impulse = this.isRasenganVariant()
                                    ? {
                                        x: ((attractByPalm ? palm.x - width / 2 : indexTip.x) - wx) * 0.025,
                                        y: ((attractByPalm ? palm.y - height / 2 : indexTip.y) - wy) * 0.025,
                                        z: 0
                                    }
                                    : { x: 0, y: 0, z: 0 };

                                if (prev && !this.isRasenganVariant()) {
                                    impulse = {
                                        x: (wx - prev.x) * 0.12,
                                        y: (wy - prev.y) * 0.12,
                                        z: 0
                                    };
                                }

                                this.spawnAt(wx, wy, 30, impulse);
                            }
                        }

                        this.prevPalmPos[handIndex] = {
                            x: palm.x - width / 2,
                            y: palm.y - height / 2
                        };
                    });
                }

                this.particles.sort((a, b) => b.z - a.z);

                const canAttract = indexTips.length > 0;
                this.rasenganSpawnTick = (this.rasenganSpawnTick + 1) % 2;

                if (this.variant === "rasengan" && canAttract && this.rasenganSpawnTick === 0) {
                    indexTips.forEach((tip) => {
                        this.spawnAt(tip.x, tip.y, 9, {
                            x: (Math.random() - 0.5) * 1.5,
                            y: (Math.random() - 0.5) * 1.5,
                            z: (Math.random() - 0.5) * 0.8
                        });
                    });
                }

                this.particles.forEach((particle) => {
                    particle.ax = 0;
                    particle.ay = 0;
                    particle.az = 0;

                    if (canAttract) {
                        indexTips.forEach((tip) => {
                            const dx = tip.x - particle.x;
                            const dy = tip.y - particle.y;
                            const dz = -particle.z;
                            const dist = Math.hypot(dx, dy, dz);
                            const range = this.isFingerRasengan() ? 260 : this.variant === "rasengan" ? 430 : 320;

                            if (dist < range && dist > 0) {
                                const closeness = (range - dist) / range;
                                const force = closeness * (this.isFingerRasengan() ? 1.52 : this.variant === "rasengan" ? 1.16 : 0.95);
                                const noise = Math.sin(
                                    particle.swirlSeed +
                                    particle.x * 0.021 +
                                    particle.y * 0.017 +
                                    Date.now() * 0.011
                                );
                                const orbitScale = this.isFingerRasengan() ? 0.38 + noise * 0.14 : this.variant === "rasengan" ? 0.74 : 0.12;
                                const orbitForce = closeness * orbitScale * (this.isFingerRasengan() ? particle.swirlDir : 1);
                                const tangentX = -dy / dist;
                                const tangentY = dx / dist;
                                const scatterForce = this.isFingerRasengan() ? closeness * (0.06 + Math.abs(noise) * 0.08) : 0;
                                const brokenRadial = this.isFingerRasengan()
                                    ? Math.sin(particle.swirlSeed * 2.7 + Date.now() * 0.018 + dist * 0.027) * closeness * 0.05
                                    : 0;

                                particle.ax += dx / dist * force;
                                particle.ay += dy / dist * force;
                                particle.az += dz / dist * force;
                                particle.ax += tangentX * orbitForce;
                                particle.ay += tangentY * orbitForce;
                                particle.ax += -dx / dist * (scatterForce + brokenRadial);
                                particle.ay += -dy / dist * (scatterForce - brokenRadial);
                                particle.az += Math.sin((particle.x + particle.y + Date.now() * 0.08) * 0.02)
                                    * (this.isFingerRasengan() ? 0.07 : this.variant === "rasengan" ? 0.18 : 0.035);
                            }
                        });

                        particle.ax += Math.sin((particle.y + particle.z + Date.now() * 0.12) * 0.01)
                            * (this.isFingerRasengan() ? 0.025 : this.variant === "rasengan" ? 0.04 : 0.02);
                        particle.ay += Math.cos((particle.x + particle.z - Date.now() * 0.09) * 0.01)
                            * (this.isFingerRasengan() ? 0.025 : this.variant === "rasengan" ? 0.04 : 0.02);
                    }

                    particle.vx += particle.ax;
                    particle.vy += particle.ay;
                    particle.vz += particle.az;

                    const damping = this.isRasenganVariant() ? 0.965 : 0.955;
                    particle.vx *= damping;
                    particle.vy *= damping;
                    particle.vz *= damping;

                    const prev = {
                        x: particle.x,
                        y: particle.y,
                        z: particle.z
                    };

                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.z += particle.vz;

                    const limitX = width * 0.75;
                    const limitY = height * 0.75;
                    const limitZ = 260;

                    if (particle.x < -limitX || particle.x > limitX) {
                        particle.vx *= -0.85;
                        particle.x = Math.max(Math.min(particle.x, limitX), -limitX);
                    }

                    if (particle.y < -limitY || particle.y > limitY) {
                        particle.vy *= -0.85;
                        particle.y = Math.max(Math.min(particle.y, limitY), -limitY);
                    }

                    if (particle.z < -limitZ || particle.z > limitZ) {
                        particle.vz *= -0.85;
                        particle.z = Math.max(Math.min(particle.z, limitZ), -limitZ);
                    }

                    particle.hue = this.isRasenganVariant()
                        ? (190 + Math.sin(Date.now() * 0.006 + particle.x * 0.01) * 38 + 360) % 360
                        : (particle.hue + 1) % 360;

                    const projected = this.project(particle.x, particle.y, particle.z);
                    const speed = Math.hypot(particle.vx, particle.vy, particle.vz);
                    const brightness = Math.min(55 + speed * 10, 95);
                    const alpha = Math.min(projected.scale * 1.5, 1);

                    if (this.isRasenganVariant()) {
                        const prevProjected = this.project(prev.x, prev.y, prev.z);
                        const trailAlpha = Math.min(alpha * 0.82, 0.9);

                        ctx.save();
                        ctx.beginPath();
                        ctx.moveTo(prevProjected.sx, prevProjected.sy);
                        ctx.lineTo(projected.sx, projected.sy);
                        ctx.lineWidth = Math.max(particle.size * projected.scale * 1.8, 1.4);
                        ctx.lineCap = "round";
                        ctx.strokeStyle = `hsla(${particle.hue},100%,${Math.min(brightness + 8, 98)}%,${trailAlpha})`;
                        ctx.shadowColor = `hsla(${particle.hue},100%,70%,0.7)`;
                        ctx.shadowBlur = 12;
                        ctx.stroke();
                        ctx.restore();
                    }

                    ctx.beginPath();
                    ctx.arc(projected.sx, projected.sy, Math.max(particle.size * projected.scale, 0.5), 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${particle.hue},100%,${brightness}%,${alpha})`;
                    ctx.fill();
                });

                indexTips.forEach((tip) => {
                    const tipProjected = this.project(tip.x, tip.y, 0);

                    this.particles.forEach((particle) => {
                        const dist2D = Math.hypot(tip.x - particle.x, tip.y - particle.y);
                        if (dist2D < 250) {
                            const projected = this.project(particle.x, particle.y, particle.z);
                            const alpha = (1 - dist2D / 250) * (this.isRasenganVariant() ? 0.22 : 0.7);
                            ctx.beginPath();
                            ctx.moveTo(tipProjected.sx, tipProjected.sy);
                            ctx.lineTo(projected.sx, projected.sy);
                            ctx.strokeStyle = `rgba(150,220,255,${alpha})`;
                            ctx.lineWidth = this.isRasenganVariant() ? Math.max(alpha * 1.35, 0.2) : alpha * 2;
                            ctx.stroke();
                        }
                    });
                });
            }

            destroy() {
                this.particles = [];
                this.prevPalmPos = {};
                super.destroy();
            }
        }

        class MainController {
            constructor(canvas, ctx, video) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.video = video;
                this.modes = [];
                this.currentIndex = 0;
                this.isCrossing = false;
                this.crossStartTime = 0;
                this.crossThreshold = 1500;
                this.modeNames = [
                    "Mode 1：粒子特效-五角星",
                    "Mode 1：粒子特效-爱心",
                    "Mode 2：取景器-黑白",
                    "Mode 2：取景器-反差色",
                    "Mode 3：3D 牵引-普通版本",
                    "Mode 3：3D 牵引-手指螺旋丸",
                    "Mode 3：3D 牵引-螺旋丸"
                ];
            }

            register(mode) {
                this.modes.push(mode);
                return this;
            }

            start() {
                this.modes[this.currentIndex].init();
                setModeText(this.modeNames[this.currentIndex]);
            }

            onFrame(landmarks) {
                if (!this.modes.length) return;
                this.checkSwitch(landmarks);
                this.modes[this.currentIndex].update(landmarks, this.video);
            }

            drawHUD() {
                const ctx = this.ctx;

                ctx.save();
                ctx.font = "bold 20px Arial";
                ctx.fillStyle = "rgba(255,255,255,0.8)";
                ctx.textAlign = "left";
                ctx.fillText(this.modeNames[this.currentIndex], 24, Math.max(this.canvas.height - 24, 28));
                ctx.restore();

                if (!this.isCrossing) return;

                const elapsed = Date.now() - this.crossStartTime;
                if (elapsed < 0) return;

                const progress = Math.min(elapsed / this.crossThreshold, 1);
                const centerX = this.canvas.width / 2;

                ctx.save();
                ctx.fillStyle = "rgba(255,255,255,0.15)";
                ctx.fillRect(centerX - 150, 30, 300, 20);
                ctx.fillStyle = "rgba(255,255,255,0.9)";
                ctx.fillRect(centerX - 150, 30, 300 * progress, 20);
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.strokeRect(centerX - 150, 30, 300, 20);
                ctx.restore();
            }

            checkSwitch(landmarks) {
                if (!landmarks || landmarks.length < 2) {
                    this.isCrossing = false;
                    return;
                }

                const tip1 = landmarks[0][8];
                const tip2 = landmarks[1][8];
                const dist = Math.hypot(tip1.x - tip2.x, tip1.y - tip2.y);

                if (dist < 0.05) {
                    if (!this.isCrossing) {
                        this.isCrossing = true;
                        this.crossStartTime = Date.now();
                    } else if (Date.now() - this.crossStartTime > this.crossThreshold) {
                        this.switchNext();
                        this.isCrossing = false;
                    }
                } else {
                    this.isCrossing = false;
                }
            }

            switchNext() {
                this.modes[this.currentIndex].destroy();
                this.currentIndex = (this.currentIndex + 1) % this.modes.length;
                this.modes[this.currentIndex].init();
                setModeText(this.modeNames[this.currentIndex]);
            }
        }

        let appStarted = false;

        async function startExperience() {
            if (appStarted) return;
            appStarted = true;
            startButton.disabled = true;
            setModeText("启动中");
            setStatus("正在加载手势识别组件并请求相机权限...", "");

            if (
                typeof window.Hands === "undefined"
            ) {
                setStatus("外部依赖加载失败。当前页面需要访问 jsDelivr，如果网络受限，这里会启动不了。", "error");
                setModeText("启动失败", "error");
                startButton.disabled = false;
                appStarted = false;
                return;
            }

            try {
                resizeCanvas();

                const controller = new MainController(canvasElement, canvasCtx, videoElement);
                controller
                    .register(new ParticleMode(canvasElement, canvasCtx, "star"))
                    .register(new ParticleMode(canvasElement, canvasCtx, "heart"))
                    .register(new ViewfinderMode(canvasElement, canvasCtx, "grayscale(100%)"))
                    .register(new ViewfinderMode(canvasElement, canvasCtx, "invert(100%) contrast(140%) saturate(130%)"))
                    .register(new TetherMode(canvasElement, canvasCtx, "normal"))
                    .register(new TetherMode(canvasElement, canvasCtx, "finger-rasengan"))
                    .register(new TetherMode(canvasElement, canvasCtx, "rasengan"))
                    .start();

                const hands = new Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });

                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.7,
                    minTrackingConfidence: 0.5
                });

                hands.onResults((results) => {
                    canvasCtx.save();
                    canvasCtx.translate(canvasElement.width, 0);
                    canvasCtx.scale(-1, 1);
                    controller.onFrame(results.multiHandLandmarks);
                    canvasCtx.restore();
                    controller.drawHUD();
                });

                const isMobileViewport = Math.min(window.innerWidth, window.innerHeight) <= 720;
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error("当前浏览器不支持摄像头 API，请换系统浏览器或使用 HTTPS 页面打开");
                }

                // Browsers block getUserMedia on http://127.0.0.1 — redirect to localhost
                if (window.location.hostname === "127.0.0.1" && window.location.protocol === "http:") {
                    const localhostUrl = window.location.href.replace("127.0.0.1", "localhost");
                    throw new Error(`浏览器不允许在 http://127.0.0.1 下访问摄像头。请改为访问：<a href="${localhostUrl}" style="color:#b8e8ff;font-weight:700;text-decoration:underline">${localhostUrl}</a>`);
                }

                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: {
                        facingMode: "user",
                        width: { ideal: isMobileViewport ? 640 : 1280 },
                        height: { ideal: isMobileViewport ? 480 : 720 }
                    },
                });

                videoElement.srcObject = stream;
                videoElement.muted = true;
                videoElement.playsInline = true;
                await videoElement.play();

                if (!videoElement.videoWidth) {
                    await new Promise((resolve) => {
                        videoElement.onloadedmetadata = resolve;
                    });
                }

                let sendingFrame = false;
                const sendFrame = async () => {
                    if (!appStarted) return;
                    if (!sendingFrame && videoElement.readyState >= 2) {
                        sendingFrame = true;
                        try {
                            await hands.send({ image: videoElement });
                        } catch (frameError) {
                            console.error(frameError);
                        } finally {
                            sendingFrame = false;
                        }
                    }
                    window.requestAnimationFrame(sendFrame);
                };
                window.requestAnimationFrame(sendFrame);

                setStatus("启动成功。请把手放进画面里开始玩。", "success");
                setModeText("摄像头已启动", "success");
                hideStartup();
            } catch (error) {
                console.error(error);
                setStatus(`启动失败：${error && error.message ? error.message : "未知错误"}。请检查相机权限，或者刷新后重试。`, "error");
                setModeText("启动失败", "error");
                startButton.disabled = false;
                appStarted = false;
            }
        }

        startButton.addEventListener("click", startExperience);
    </script>
</body>
</html>
