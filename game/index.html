<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>game！</title>
    <link rel="icon" href="/images/custom-particlex-avatar.png" />
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #eef8ff;
            background:
                radial-gradient(circle at 15% 20%, rgba(115, 255, 228, 0.26), transparent 30%),
                radial-gradient(circle at 85% 15%, rgba(89, 174, 255, 0.2), transparent 28%),
                linear-gradient(135deg, #081322 0%, #0f2842 42%, #0d1c34 100%);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            inset: 0;
            position: fixed;
            pointer-events: none;
            background:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 26px 26px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 95%);
        }

        .game-shell {
            margin: 0 auto;
            max-width: 1240px;
            padding: 24px 26px 56px;
        }

        .game-nav {
            align-items: center;
            display: flex;
            gap: 18px;
            justify-content: space-between;
            margin-bottom: 34px;
        }

        .game-brand,
        .game-nav-links a {
            align-items: center;
            color: #e8f7ff;
            display: inline-flex;
            gap: 8px;
            text-decoration: none;
        }

        .game-brand {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .game-nav-links {
            align-items: center;
            background: rgba(8, 18, 34, 0.56);
            border: 1px solid rgba(129, 210, 255, 0.22);
            border-radius: 999px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: flex-end;
            padding: 7px;
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
        }

        .game-nav-links a {
            border-radius: 999px;
            font-size: 14px;
            font-weight: 800;
            padding: 8px 11px;
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .game-nav-links a:hover,
        .game-nav-links a.active {
            background: rgba(141, 233, 255, 0.16);
            color: #9fe8ff;
            transform: translateY(-1px);
        }

        .game-back {
            align-items: center;
            background: rgba(12, 22, 40, 0.7);
            border: 1px solid rgba(129, 210, 255, 0.24);
            border-radius: 999px;
            color: #d7efff;
            display: inline-flex;
            gap: 8px;
            padding: 11px 16px;
            text-decoration: none;
            -webkit-backdrop-filter: blur(14px);
            backdrop-filter: blur(14px);
        }

        .game-title-wrap {
            margin-bottom: 30px;
            text-align: left;
        }

        .game-kicker {
            color: #8de9ff;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.16em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .game-title {
            font-size: clamp(34px, 5vw, 64px);
            font-weight: 900;
            letter-spacing: 0.02em;
            margin: 0 0 12px;
            text-shadow: 0 0 18px rgba(80, 184, 255, 0.26);
        }

        .game-desc {
            color: rgba(224, 241, 255, 0.78);
            font-size: 16px;
            line-height: 1.8;
            margin: 0;
            max-width: 44em;
        }

        .game-grid {
            display: grid;
            gap: 22px;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }

        .game-card {
            background: rgba(11, 23, 42, 0.7);
            border: 1px solid rgba(129, 210, 255, 0.24);
            border-radius: 28px;
            color: inherit;
            display: block;
            min-height: 320px;
            overflow: hidden;
            position: relative;
            text-decoration: none;
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
        }

        .game-card:hover {
            border-color: rgba(151, 228, 255, 0.5);
            box-shadow: 0 26px 60px rgba(0, 0, 0, 0.28), 0 0 30px rgba(82, 194, 255, 0.15);
            transform: translateY(-8px);
        }

        .game-card-media {
            align-items: center;
            display: flex;
            height: 220px;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .game-card-media::after {
            content: "";
            inset: 0;
            position: absolute;
            background: linear-gradient(to top, rgba(8, 16, 30, 0.35), transparent 40%);
        }

        .game-card-cover {
            display: block;
            height: 100%;
            object-fit: cover;
            position: relative;
            width: 100%;
            z-index: 1;
        }

        .game-card-badge {
            background: rgba(255, 255, 255, 0.88);
            border-radius: 999px;
            color: #12395e;
            font-size: 12px;
            font-weight: 900;
            left: 16px;
            letter-spacing: 0.08em;
            padding: 7px 10px;
            position: absolute;
            text-transform: uppercase;
            top: 16px;
            z-index: 2;
        }

        .game-card-info {
            padding: 18px 20px 22px;
        }

        .game-card-info h3 {
            font-size: 26px;
            margin: 0 0 10px;
        }

        .game-card-info p {
            color: rgba(226, 241, 255, 0.78);
            line-height: 1.75;
            margin: 0 0 14px;
        }

        .game-card-info p a {
            color: #9ff0ff;
            font-weight: 900;
            text-decoration: none;
        }

        .game-card-info p a:hover {
            text-decoration: underline;
        }

        .game-card-action {
            color: #98ecff;
            display: inline-block;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-decoration: none;
            text-transform: uppercase;
        }

        .game-card-hand {
            height: 150px;
            position: relative;
            width: 150px;
            z-index: 1;
        }

        .game-card-hand-palm {
            background: linear-gradient(145deg, #ffe082 0%, #ffca28 55%, #f0b400 100%);
            border-radius: 44px;
            bottom: 0;
            box-shadow: inset 0 -12px 24px rgba(0, 0, 0, 0.08);
            height: 94px;
            left: 28px;
            position: absolute;
            width: 92px;
        }

        .game-card-hand-finger {
            background: linear-gradient(145deg, #fff09a 0%, #ffd54f 62%, #f7b500 100%);
            border-radius: 28px;
            position: absolute;
            transform-origin: bottom center;
            width: 20px;
        }

        .game-card-hand-finger::after {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            content: "";
            inset: 8px 4px 16px;
            position: absolute;
        }

        .finger-1 {
            height: 72px;
            left: 28px;
            top: 22px;
            transform: rotate(-18deg);
        }

        .finger-2 {
            height: 92px;
            left: 50px;
            top: 6px;
        }

        .finger-3 {
            height: 96px;
            left: 70px;
            top: 2px;
        }

        .finger-4 {
            height: 84px;
            left: 90px;
            top: 14px;
            transform: rotate(10deg);
        }

        .finger-5 {
            height: 62px;
            left: 10px;
            top: 50px;
            transform: rotate(-38deg);
        }

        .game-card-active .game-card-media {
            background:
                radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0) 42%),
                linear-gradient(160deg, #58e6df 0%, #a8f6ef 34%, #5bc8ff 100%);
        }

        .game-card-disabled {
            opacity: 0.7;
            pointer-events: none;
        }

        .game-card-disabled .game-card-media {
            background:
                radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0) 34%),
                linear-gradient(145deg, #504e75 0%, #6e7ba6 100%);
        }

        .coming-soon {
            color: #fff;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 0.06em;
            position: relative;
            text-transform: uppercase;
            z-index: 1;
        }

        @media (max-width: 720px) {
            .game-shell {
                padding: 24px 16px 40px;
            }

            .game-nav {
                align-items: flex-start;
                flex-direction: column;
            }

            .game-nav-links {
                border-radius: 22px;
                justify-content: flex-start;
                width: 100%;
            }

            .game-grid {
                grid-template-columns: 1fr;
            }

            .game-card {
                min-height: 0;
            }
        }
    </style>
</head>
<body>
    <main class="game-shell">
        <nav class="game-nav" aria-label="博客导航">
            <a class="game-brand" href="/">0xt5 Blog</a>
            <div class="game-nav-links">
                <a href="/">首页</a>
                <a href="/about/">碎碎念</a>
                <a href="/categories/">归档</a>
                <a href="/comment/">留言板</a>
                <a href="/tags/">标签</a>
                <a href="/links/">友情链接</a>
                <a class="active" href="/game/">game！</a>
            </div>
        </nav>

        <section class="game-title-wrap">
            <div class="game-kicker">0xt5 Game Hub</div>
            <h1 class="game-title">游戏选择页</h1>
            <p class="game-desc">欢迎来玩 图个乐子就好啦</p>
        </section>

        <section class="game-grid">
            <article class="game-card game-card-guide">
                <a class="game-card-media" href="/game/tutorial/" aria-label="打开游戏前置教程">
                    <div class="game-card-badge">Guide</div>
                    <img class="game-card-cover" src="/game/assets/tutorial-cover.png" alt="游戏前置教程封面" />
                </a>
                <div class="game-card-info">
                    <h3>游戏前置教程(✪ω✪)</h3>
                    <p>玩不懂的可以看一下这里，实在玩不懂的在 <a href="/comment/">留言板</a> 留言就好啦(σﾟ∀ﾟ)σ..</p>
                    <a class="game-card-action" href="/game/tutorial/">Open Guide</a>
                </div>
            </article>

            <a class="game-card game-card-active" href="/game/hand-project/index.html">
                <div class="game-card-media">
                    <div class="game-card-badge">AI</div>
                    <img class="game-card-cover" src="/game/assets/hand-project-cover.png" alt="序章·从粒子里出发封面" />
                </div>
                <div class="game-card-info">
                    <h3>序章·从粒子里出发</h3>
                    <p>MediaPipe Hands + 粒子 / 取景器 / 3D 牵引，点击后进入独立游戏页。</p>
                    <div class="game-card-action">Click To Enter</div>
                </div>
            </a>

            <div class="game-card game-card-disabled">
                <div class="game-card-media">
                    <div class="game-card-badge">Next</div>
                    <div class="coming-soon">Soon</div>
                </div>
                <div class="game-card-info">
                    <h3>下一个项目位</h3>
                    <p>敬请期待！</p>
                    <div class="game-card-action">Waiting</div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
